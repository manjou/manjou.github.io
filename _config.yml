title: Bernd Janzen
tagline: GRC Analyst | Governance, Risk & Compliance | Security Operations
description: GRC Analyst in Berlin. EU regulatory compliance (EU AI Act, GDPR, NIST CSF 2.0), compliance automation with Python, and security operations.
baseurl: ""
url: "https://manjou.github.io"

author:
  name: Bernd Janzen
  email: bernd.janzen@proton.me
  location: Berlin, Germany

social:
  linkedin: https://www.linkedin.com/in/bernd-janzen
  github: https://github.com/manjou
